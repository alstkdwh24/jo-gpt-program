# Server Configuration
server.port=8082
server.session.cookie.same-site=strict

# Spring Application Name
spring.application.name=JO_GPT_PROGRAM

# Database Configuration (MySQL)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/joGpt?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=${joGptPw}

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Static Resources Configuration
spring.web.resources.static-locations=classpath:/static/

# JWT and Custom Configuration
spring.jwt.expiration_time=${expiration_time}
spring.jwt.secret=${joGptSecret}

# Logging Level Configuration
spring.output.ansi.enabled=always
logging.level.org.springframework.security.oauth2=INFO
logging.level.org.springframework.web.client=DEBUG
logging.level.com.example.jogptreal=DEBUG
logging.level.com.example.jo_gpt_program=DEBUG
logging.level.com.example.memberssecurity=DEBUG

spring.llm.key=${gemini-key}

# Disable LiveReload
spring.devtools.livereload.enabled=true
spring.devtools.livereload.port=35730